server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let vue-router handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
